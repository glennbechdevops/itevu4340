<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Coffee - Premium Coffee Beans</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Chaos Coffee Co.</h1>
            <p class="tagline">Engineering Antifragile Brews Since 2024</p>
            <div class="cart-icon" onclick="toggleCart()">
                <span>Cart</span>
                <span class="cart-count" id="cart-count">0</span>
            </div>
        </header>

        <main>
            <section class="products" id="products">
                <!-- Products will be rendered here by JavaScript -->
            </section>

            <aside class="cart-panel" id="cart-panel">
                <div class="cart-header">
                    <h2>Your Cart</h2>
                    <button class="close-cart" onclick="toggleCart()">×</button>
                </div>
                <div class="cart-items" id="cart-items">
                    <p class="empty-cart">Your cart is empty</p>
                </div>
                <div class="cart-footer">
                    <div class="cart-total">
                        <span>Total:</span>
                        <span id="cart-total">$0.00</span>
                    </div>
                    <button class="checkout-btn" id="checkout-btn" onclick="checkout()">
                        Checkout
                    </button>
                </div>
                <div class="status-message" id="status-message"></div>
            </aside>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
